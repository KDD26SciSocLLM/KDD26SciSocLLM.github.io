name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches:
      - master  # 监听 master 分支的改动

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # 如果你的项目需要特定版本的 Ruby，请在这里修改
          bundler-cache: true # 自动缓存 gems 以加快构建速度

      - name: Build Jekyll site
        run: |
          bundle install
          bundle exec jekyll build

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages  # ⚠️ 注意：如果你的分支名字精确地叫 github_pages，请将这里改为 github_pages
          commit_message: "Deploy from master"