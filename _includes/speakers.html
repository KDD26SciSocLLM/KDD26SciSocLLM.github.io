<section id="speakers">
  <div class="container">
    <div class="row justify-content-center">
      <div class="section-heading col-md-10 custom-lg-6">
        <h3>Invited Speakers</h3>
        <div class="separator-div"></div>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-md-10"> <div class="row justify-content-center">
          {% for speaker in page.speakers %}
          <div class="col-md-4 text-center mb-4">
            <div class="single-speaker" data-speaker="{{ speaker.name | slugify }}">
              {% if speaker.website %}
              <a href="{{ speaker.website }}" target="_blank" style="text-decoration: none; color: inherit;">
              {% endif %}
                
                {% if speaker.image and speaker.image != "" %}
                  <img src="{{ '/assets/images/speakers/' | append: speaker.image | relative_url }}" alt="{{ speaker.name }}" class="img-fluid speaker-img" style="border-radius: 50%; aspect-ratio: 1/1; object-fit: cover; max-width: 180px; margin-bottom: 15px;" />
                {% else %}
                  <img src="https://placehold.co/200x200/f8f9fa/adb5bd?text=TBA" alt="To Be Announced" class="img-fluid speaker-img" style="border-radius: 50%; aspect-ratio: 1/1; object-fit: cover; max-width: 180px; margin-bottom: 15px;" />
                {% endif %}

                <h5 style="margin-bottom: 5px;">{{ speaker.name }}</h5>
              {% if speaker.website %}
              </a>
              {% endif %}
              <p class="text-muted" style="font-size: 0.95em;">{{ speaker.affiliation }}</p>
            </div>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</section>
